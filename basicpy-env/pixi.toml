[workspace]
channels = ["conda-forge"]
name = "basicpy"
platforms = ["osx-arm64", "win-64", "linux-64"]
version = "0.1.0"

[tasks]
setup-basicpy = "python populate_scyjava_cache.py"

[dependencies]
python = "3.10.*"
scipy = "<1.13"
# JVM is provided at runtime by scyjava/cjdk (downloads Zulu 11 on first use).

[pypi-dependencies]
basicpy = "==2.0.0"
bioio-bioformats = "==1.3.2"
imagecodecs=">=2025.3.30"
scikit-image=">=0.21.0"
opencv-python-headless = ">=4.11.0.86, <5"
